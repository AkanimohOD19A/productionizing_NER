# .github/workflows/ner_pipeline.yml
name: NER Classification Pipeline

on:
  # Run on schedule (daily at 2 AM UTC)
  schedule:
    - cron: '0 2 * * *'
  # Run on push to master
  push:
    branches: [ master ]
  # Run on pull requests
  pull_request:
    branches: [ master ]
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      data_size:
        description: 'Number of transactions to generate'
        required: false
        default: '1000'
      run_training:
        description: 'Run model training'
        type: boolean
        default: true

env:
  PYTHON_VERSION: '3.13' #'3.9'
  R_VERSION: '4.3'
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  CACHE_VERSION: v1

jobs:
  # Job 1: Generate synthetic transaction data
  generate-data:
    runs-on: ubuntu-latest
    outputs:
      data_file: ${{ steps.generate.outputs.data_file }}
      timestamp: ${{ steps.generate.outputs.timestamp }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      # Cache Python dependencies
      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy pyyaml

      - name: Generate synthetic transaction data
        id: generate
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          DATA_SIZE=${{ github.event.inputs.data_size || '1000' }}
          DATA_FILE="data/transactions_${TIMESTAMP}.csv"
          
          echo "Generating ${DATA_SIZE} transactions..."
          python scripts/generate_sample_data.py --size ${DATA_SIZE} --output ${DATA_FILE}
          
          echo "data_file=${DATA_FILE}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: transaction-data-${{ steps.generate.outputs.timestamp }}
          path: |
            ${{ steps.generate.outputs.data_file }}
            data/*_metadata.json
          retention-days: 7  # Reduced from 30 to save space

  # Job 2: Run tests
  test:
    runs-on: ubuntu-latest
    needs: generate-data

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      # Cache test dependencies
      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ env.CACHE_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      # Cache pytest results
      - name: Cache pytest
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ env.CACHE_VERSION }}-${{ hashFiles('tests/**/*.py') }}

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=src/python --cov-report=xml --cov-report=html

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

#      - name: Upload test results
#        uses: actions/upload-artifact@v4
#        if: always()
#        with:
#          name: test-results
#          path: |
#            coverage.xml
#            htmlcov/

  # Job 3: Train NER model
  train-model:
    runs-on: ubuntu-latest
    needs: [generate-data, test]
    if: github.event.inputs.run_training != 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      # Cache Python packages
      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-train-${{ env.CACHE_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-train-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Download GENERATED data (not from repo)
      - name: Download transaction data
        uses: actions/download-artifact@v4
        with:
          name: transaction-data-${{ needs.generate-data.outputs.timestamp }}
          path: data/

      # Cache MLflow artifacts
      - name: Cache MLflow artifacts
        uses: actions/cache@v4
        with:
          path: mlruns
          key: ${{ runner.os }}-mlflow-${{ env.CACHE_VERSION }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-mlflow-${{ env.CACHE_VERSION }}-

      - name: Train NER classifier
        env:
          MLFLOW_TRACKING_URI: file:./mlruns #${{ secrets.MLFLOW_TRACKING_URI || 'file:./mlruns' }}
        run: |
          DATA_FILE="${{ needs.generate-data.outputs.data_file }}"
          echo "Training model on ${DATA_FILE}..."
          python src/python/train_model.py ${DATA_FILE}

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ needs.generate-data.outputs.timestamp }}
          path: |
            models/ner_classifier.pkl
            mlruns/
            data/processed/
          retention-days: 30
          compression-level: 9 # Max compression

#      - name: Save metrics
#        run: |
#          if [ -f "data/processed/metrics.json" ]; then
#            cat data/processed/metrics.json
#            echo "METRICS_AVAILABLE=true" >> $GITHUB_ENV
#          fi
#
